<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maxmud Bank</title>
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <aside class="sidebar">
        <h1>Maxmud Bank</h1>
        <ul class="menu-list">
            <li><i class="bi bi-arrow-left-right"></i></li>
            <li><i class="bi bi-people"></i></li>
            <li><i class="bi bi-credit-card"></i></li>
            <li><i class="bi bi-wallet2"></i></li>
            <li><i class="bi bi-cash-coin"></i></li>
            <li><i class="bi bi-"></i></li>
        </ul>
    </aside>
    <header class ="header">
            <div class="searchBar">
                <i class="bi bi-search"></i>
                <input class="search" type="text" title="Search..." placeholder="Search..." >
            </div>
        <div class="live-toggle-container">
            <label class="toggle">
            <input type="checkbox" checked>
            <span class="slider"></span>
            </label>
            <span class="live-label">Live</span>
        </div>
            <div class="lang-select-wrapper">
        <select class="lang-select">
            <option value="en">English</option>
            <option value="ru">Russian</option>
        </select>
        <i class="bi bi-chevron-down custom-arrow"></i>

            <div class="notification">
              <i class="bi bi-bell"></i>
              <span class="dot"></span>
            </div>

            <div class="user-profile">
            <img src="images/hitler_360x450.jpg" alt="User" class="avatar">
            <div class="user-info">
            <span class="user-name">Adolf Mahmud</span>
            <span class="user-id">ID: 14886767</span>
            </div>
            <i class="bi bi-chevron-down arrow"></i>
            </div>
    </header>






</body>
</html>
