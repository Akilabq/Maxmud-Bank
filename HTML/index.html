<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maxmud Bank</title>
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <aside class="sidebar">
        <h1>Maxmud Bank</h1>
        <h3>Payments</h3>
        <ul class="menu-list">
            <li><i class="bi bi-arrow-left-right"></i>Transactions</li>
            <li><i class="bi bi-people"></i>Customers</li>
            <li><i class="bi bi-credit-card"></i>Payouts</li>
            <li><i class="bi bi-cash-coin"></i>Balances</li>
            <li><i class="bi bi-card-checklist"></i>Subscriptions</li>
            <li><i class="bi bi-list"></i>Payment plans</li>
        </ul>
        <hr>
        <h3>Commerce</h3>
        <hr>
        <ul class="menu-list">
            <li><i class="bi bi-arrow-left-right"></i>Refferals</li>
            <li><i class="bi bi-eye-fill"></i>Audit logs</li>
            <li><i class="bi bi-gear-fill"></i>Settings</li>
        </ul>
    </aside>
    <header class ="header">
        
            <div class="searchBar">
                <i class="bi bi-search"></i>
                <input class="search" type="text" title="Search..." placeholder="Search..." >
            </div>
        <div class="headericons">
            <div class="huynatogle"></div>  
            <label class="switch">
            <input type="checkbox" checked>
            <span class="slider"></span>
            </label>
            <span>Live</span>

            <div class="lang-select">
            English <span class="arrow">⌄</span>
            </div>

            <div class="notification">
              <i class="bi bi-bell"></i>
              <span class="dot"></span>
            </div>

            <div class="user-profile">
            <img src="" alt="User" class="avatar">
            <div class="user-info">
            <span class="user-name">Anddy's Makeover</span>
            <span class="user-id">ID: 1234567</span>
            </div>
            <span class="arrow">⌄</span>
        </div>
    </header>






</body>
</html>
